#
# Example job using the CLI image to run a CxAST scan
#
# Configuration through environment variables in CircleCI
#
# Documentation:
# https://checkmarx.com/resource/documents/en/34965-68721-checkmarx-one-circleci-integration.html
#

version: 2
jobs:
  build:
    docker:
      - image: checkmarx/ast-cli:2.3.53@sha256:5c05cf0a9ef9c74620978d3022c8ffbeb9e5c4860a71b727369d9fe9eecc0134
    steps:
      - checkout
      - run:
          name: "Run Scan"
          command: |
            /app/bin/cx \
            scan create \
            -s . \
            --agent CircleCI \
            --project-name $CIRCLE_PROJECT_REPONAME \
            --branch $CIRCLE_BRANCH \
            --base-uri $BASE_URI \
            --tenant $TENANT \
            --client-id $CLIENT_ID \
            --client-secret $CLIENT_SECRET \
            $ADDITIONAL_PARAMS
